<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#1c1f26"/>

  <!-- broadcast arcs, all centered on the dot at (16, 27) -->
  <!-- outer arc  r=13, opacity 0.35 -->
  <path d="M 3 27 A 13 13 0 0 0 29 27"
        fill="none" stroke="#dc3545" stroke-width="2.2"
        stroke-linecap="round" opacity="0.35"/>
  <!-- middle arc r=9,  opacity 0.65 -->
  <path d="M 7 27 A 9 9 0 0 0 25 27"
        fill="none" stroke="#dc3545" stroke-width="2.2"
        stroke-linecap="round" opacity="0.65"/>
  <!-- inner arc  r=5,  full opacity -->
  <path d="M 11 27 A 5 5 0 0 0 21 27"
        fill="none" stroke="#dc3545" stroke-width="2.2"
        stroke-linecap="round"/>

  <!-- transmitter dot -->
  <circle cx="16" cy="27" r="2.5" fill="#dc3545"/>
</svg>
